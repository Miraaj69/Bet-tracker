name: Inline React Scripts into HTML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install React + ReactDOM + Babel locally
        run: |
          npm install react@18.2.0 react-dom@18.2.0 @babel/standalone@7.24.0 --no-save --prefix /tmp/react_libs

      - name: Inline scripts into index.html
        run: |
          python3 << 'PYEOF'
          import re

          html = open('assets/index.html', 'r', encoding='utf-8').read()
          print(f"Original size: {len(html)//1024}KB")

          react    = open('/tmp/react_libs/node_modules/react/umd/react.production.min.js').read()
          reactdom = open('/tmp/react_libs/node_modules/react-dom/umd/react-dom.production.min.js').read()
          babel    = open('/tmp/react_libs/node_modules/@babel/standalone/babel.min.js').read()

          html = html.replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>',
              f'<script>{react}</script>'
          )
          html = html.replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>',
              f'<script>{reactdom}</script>'
          )
          html = html.replace(
              '<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>',
              f'<script>{babel}</script>'
          )
          html = re.sub(r'<script defer src="https://static\.cloudflareinsights\.com/.*?</script>', '', html, flags=re.DOTALL)

          import os
          os.makedirs('output', exist_ok=True)
          open('output/index.html', 'w', encoding='utf-8').write(html)
          print(f"Final size: {len(html)//1024}KB - Done!")
          PYEOF

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: inlined-index-html
          path: output/index.html
          retention-days: 7
