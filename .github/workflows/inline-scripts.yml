name: Inline React Scripts into HTML

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install React + ReactDOM + Babel locally
        run: |
          npm install react@18.2.0 react-dom@18.2.0 @babel/standalone@7.24.0 --no-save --prefix /tmp/react_libs

      - name: Inline scripts into index.html
        run: |
          python3 << 'PYEOF'
          import re

          html = open('assets/index.html', 'r', encoding='utf-8').read()
          print(f"Original size: {len(html)//1024}KB")

          react    = open('/tmp/react_libs/node_modules/react/umd/react.production.min.js').read()
          reactdom = open('/tmp/react_libs/node_modules/react-dom/umd/react-dom.production.min.js').read()
          babel    = open('/tmp/react_libs/node_modules/@babel/standalone/babel.min.js').read()

          html = html.replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>',
              f'<script>{react}</script>'
          )
          html = html.replace(
              '<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>',
              f'<script>{reactdom}</script>'
          )
          html = html.replace(
              '<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>',
              f'<script>{babel}</script>'
          )
          html = re.sub(r'<script defer src="https://static\.cloudflareinsights\.com/.*?</script>', '', html, flags=re.DOTALL)

          open('assets/index.html', 'w', encoding='utf-8').write(html)
          print(f"Final size: {len(html)//1024}KB - Done!")
          PYEOF

      - name: Commit and force push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "build: inline React+Babel for offline WebView [skip ci]"
          git push --force-with-lease origin main
