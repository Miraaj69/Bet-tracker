// TIPSTER TRACKER MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function TipsterModal({show,onClose,bets,t,showToast}){
  const tipsters=[...new Set(bets.flatMap(b=>b.tags||[]).filter(tag=>tag.startsWith("tip:")||bets.some(b2=>(b2.tags||[]).includes(tag)&&tag.length>1)))];
  // Group bets by tipster tag
  const tipsterTags=[...new Set(bets.flatMap(b=>(b.tags||[]).filter(t=>t.startsWith("tip:"))))];
  const genTags=[...new Set(bets.flatMap(b=>b.tags||[]))];
  const allGroups=genTags.map(tag=>{
    const tb=bets.filter(b=>(b.tags||[]).includes(tag));
    const settled=tb.filter(b=>["won","lost"].includes(b.result));
    const won=settled.filter(b=>b.result==="won").length;
    const pl=tb.reduce((s,b)=>s+(b.profit||0),0);
    const stake=tb.reduce((s,b)=>s+(b.stake||0),0);
    const roi=stake>0?(pl/stake*100).toFixed(1):0;
    const wr=settled.length>0?(won/settled.length*100).toFixed(0):0;
    return{tag,bets:tb.length,won,settled:settled.length,pl,roi,wr,stake};
  }).filter(g=>g.bets>=1).sort((a,b)=>b.pl-a.pl);

  if(!show)return null;
  return(

// PROJECTION TAB SECTION (used inside AnalyticsTab)
// ═══════════════════════════════════════════════════════════════════════════════
function ProjectionSection({bets,t}){
  const [days,setDays]=useState(30);
  const settled=bets.filter(b=>["won","lost"].includes(b.result));
  if(settled.length<10)return null;
  const wr=settled.filter(b=>b.result==="won").length/settled.length;
  const avgStake=bets.reduce((s,b)=>s+(b.stake||0),0)/bets.length;
  const avgOdds=bets.reduce((s,b)=>s+(b.odds||0),0)/bets.length;
  const betsPerDay=bets.length/Math.max(1,Math.ceil((new Date()-new Date(bets[bets.length-1]?.date))/(1000*86400)));
  const totalBets=Math.round(betsPerDay*days);
  // Scenarios
  const scenarios=[
    {label:"Pessimistic",wr:wr*0.85,color:"#ff453a",dash:"6,3"},
    {label:"Realistic",wr,color:"#ffd60a",dash:"none"},
    {label:"Optimistic",wr:Math.min(wr*1.15,0.95),color:"#30d158",dash:"4,2"},
  ];
  const W=300,H=100;
  const pts_arr=scenarios.map(sc=>{
    let run=0;const pts=[];
    for(let i=0;i<=Math.min(totalBets,60);i++){
      const expectedWins=i*sc.wr;const expectedLosses=i*(1-sc.wr);
      run=Math.round(expectedWins*avgStake*(avgOdds-1)-expectedLosses*avgStake);
      pts.push(run);
    }
    return pts;
  });
  const allVals=pts_arr.flat();
  const mn=Math.min(...allVals,0),mx=Math.max(...allVals,1);
  const range=mx-mn||1;
  const px=(i,len)=>(i/(len-1||1))*W;
  const py=(v)=>H-clamp(((v-mn)/range)*H*0.88+H*0.06,2,H-2);

  return(
    <Glass t={t} style={{marginBottom:12}}>
      <SectionHead title="🔮 P&L Projection" sub={`Next ${days} days forecast`} t={t} action={
        <div style={{display:"flex",gap:4}}>
          {[30,60,90].map(d=><button key={d} onClick={()=>setDays(d)} style={{background:days===d?"rgba(10,132,255,0.25)":t.inp,border:`1px solid ${days===d?"rgba(10,132,255,0.5)":t.inpB}`,borderRadius:7,color:days===d?"#0a84ff":t.muted,padding:"3px 9px",fontSize:9,fontWeight:700,cursor:"pointer"}}>{d}d</button>)}
        </div>
      }/>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,display:"block",marginBottom:6}}>
        <line x1="0" y1={py(0)} x2={W} y2={py(0)} stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="3,3"/>
        {scenarios.map((sc,si)=>{
          const pts=pts_arr[si];
          const polyPts=pts.map((v,i)=>`${px(i,pts.length)},${py(v)}`).join(" ");
          return<polyline key={si} points={polyPts} fill="none" stroke={sc.color} strokeWidth={si===1?2:1.5} strokeDasharray={sc.dash} strokeLinejoin="round" strokeLinecap="round" opacity={si===1?1:0.65}/>;
        })}
      </svg>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:10}}>
        {scenarios.map((sc,si)=>(
          <div key={si} style={{flex:1,minWidth:80,background:t.inp,border:`1px solid ${sc.color}35`,borderRadius:12,padding:"9px 11px",textAlign:"center"}}>
            <div style={{fontSize:8,color:t.muted,textTransform:"uppercase",marginBottom:3,display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
              <div style={{width:16,height:2,background:sc.color,borderRadius:1}}/>
              {sc.label}
            </div>
            <div style={{fontSize:14,fontWeight:800,color:sc.color}}>{pts_arr[si][pts_arr[si].length-1]>=0?"+":""}{fc(pts_arr[si][pts_arr[si].length-1])}</div>
            <div style={{fontSize:8,color:t.muted}}>{(sc.wr*100).toFixed(0)}% WR</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:9,color:t.muted,lineHeight:1.6,background:t.inp,borderRadius:10,padding:"8px 11px"}}>
        📊 Based on {bets.length} bets · {betsPerDay.toFixed(1)} bets/day · Avg stake {fc(avgStake)} · Avg odds {avgOdds.toFixed(2)}
      </div>
    </Glass>
  );
}

// TAB: REPORT
// ═══════════════════════════════════════════════════════════════════════════════
function ReportTab({bets,t,showToast}){
  const [period,setPeriod]=useState("week");
  const [customStart,setCustomStart]=useState(()=>{const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);});
  const [customEnd,setCustomEnd]=useState(today());

  const now=new Date();
  const getPeriodBets=()=>{
    if(period==="week"){const s=new Date(now);s.setDate(s.getDate()-7);return bets.filter(b=>new Date(b.date)>=s);}
    if(period==="month"){const s=new Date(now.getFullYear(),now.getMonth(),1);return bets.filter(b=>new Date(b.date)>=s);}
    if(period==="lastmonth"){const s=new Date(now.getFullYear(),now.getMonth()-1,1);const e=new Date(now.getFullYear(),now.getMonth(),0);return bets.filter(b=>{const d=new Date(b.date);return d>=s&&d<=e;});}
    if(period==="year"){const s=new Date(now.getFullYear(),0,1);return bets.filter(b=>new Date(b.date)>=s);}
    if(period==="custom"){return bets.filter(b=>b.date>=customStart&&b.date<=customEnd);}
    return bets;
  };

  const pb=getPeriodBets();
  const settled=pb.filter(b=>["won","lost","half-won","half-lost"].includes(b.result));
  const won=pb.filter(b=>b.result==="won").length;
  const lost=pb.filter(b=>b.result==="lost").length;
  const pending=pb.filter(b=>b.result==="pending").length;
  const tPL=pb.reduce((s,b)=>s+(b.profit||0),0);
  const tStake=pb.reduce((s,b)=>s+(b.stake||0),0);
  const roi=tStake>0?(tPL/tStake)*100:0;
  const wr=settled.length>0?(won/settled.length)*100:0;
  const avgOdds=pb.length?pb.reduce((s,b)=>s+(b.odds||0),0)/pb.length:0;
  const avgStake=pb.length?tStake/pb.length:0;
  const best=pb.length?pb.reduce((a,b)=>(b.profit||0)>(a.profit||0)?b:a,pb[0]):null;
  const worst=pb.length?pb.reduce((a,b)=>(b.profit||0)<(a.profit||0)?b:a,pb[0]):null;

  // By sport breakdown
  const sportMap={};pb.forEach(b=>{const s=b.sport||"cricket";if(!sportMap[s])sportMap[s]={bets:0,pl:0,won:0,total:0};sportMap[s].bets++;sportMap[s].pl+=(b.profit||0);if(["won","lost"].includes(b.result))sportMap[s].total++;if(b.result==="won")sportMap[s].won++;});
  // By bookie
  const bkMap={};pb.forEach(b=>{const bk=b.bookie||"Other";if(!bkMap[bk])bkMap[bk]={bets:0,pl:0,won:0,total:0};bkMap[bk].bets++;bkMap[bk].pl+=(b.profit||0);if(["won","lost"].includes(b.result))bkMap[bk].total++;if(b.result==="won")bkMap[bk].won++;});
  // By tag
  const tagMap={};pb.forEach(b=>(b.tags||[]).forEach(tag=>{if(!tagMap[tag])tagMap[tag]={bets:0,pl:0};tagMap[tag].bets++;tagMap[tag].pl+=(b.profit||0);}));
  // Daily line
  const dayMap={};pb.forEach(b=>{if(!dayMap[b.date])dayMap[b.date]=0;dayMap[b.date]+=(b.profit||0);});
  let run2=0;const runData2=Object.entries(dayMap).sort().map(([date,v])=>{run2+=v;return{date:date.slice(5),v:run2};});

  const periodLabel={week:"This Week",month:"This Month",lastmonth:"Last Month",year:"This Year",all:"All Time",custom:"Custom Range"}[period];

  const exportReport=()=>{
    const lines=[
      `BetTracker Pro — ${periodLabel} Report`,
      `Generated: ${new Date().toLocaleDateString("en-IN")}`,
      ``,`═══════ SUMMARY ═══════`,
      `Total Bets: ${pb.length} (${won}W · ${lost}L · ${pending}⏳)`,
      `Win Rate: ${wr.toFixed(1)}%`,
      `Total P&L: ${tPL>=0?"+":""}₹${Math.round(tPL)}`,
      `ROI: ${roi.toFixed(1)}%`,
      `Total Staked: ₹${Math.round(tStake)}`,
      `Avg Odds: ${avgOdds.toFixed(2)}`,
      `Avg Stake: ₹${Math.round(avgStake)}`,
      ``,`═══════ BEST BET ═══════`,
      best?`${best.match} @ ${best.odds} → +₹${Math.round(best.profit||0)}`:"None",
      ``,`═══════ WORST BET ═══════`,
      worst&&worst.result!=="pending"?`${worst.match} @ ${worst.odds} → ₹${Math.round(worst.profit||0)}`:"None",
      ``,`═══════ BY SPORT ═══════`,
      ...Object.entries(sportMap).map(([s,d])=>`${SPORTS[s]?.icon||"🎲"} ${SPORTS[s]?.name||s}: ₹${Math.round(d.pl)} · ${d.bets} bets · ${d.total>0?Math.round(d.won/d.total*100):0}% WR`),
      ``,`═══════ BY BOOKIE ═══════`,
      ...Object.entries(bkMap).map(([bk,d])=>`${bk}: ₹${Math.round(d.pl)} · ${d.bets} bets`),
    ];
    const blob=new Blob([lines.join("\n")],{type:"text/plain"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`BetReport-${periodLabel.replace(/ /g,"-")}-${today()}.txt`;a.click();
    showToast("📋 Report exported!","success");
  };

  const iS={background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:10,color:t.text,fontSize:12,padding:"7px 10px",outline:"none",fontFamily:"inherit"};
  const plC=tPL>=0?"#30d158":"#ff453a";

  return(
    <div className="fade-up">
      {/* Period Picker */}
      <Glass t={t} style={{marginBottom:12}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:period==="custom"?10:0}}>
          {[["week","This Week"],["month","This Month"],["lastmonth","Last Month"],["year","This Year"],["all","All Time"],["custom","Custom"]].map(([k,l])=>(
            <button key={k} onClick={()=>setPeriod(k)} className="btn-press" style={{flex:1,minWidth:72,background:period===k?"rgba(10,132,255,0.25)":t.inp,border:`1px solid ${period===k?"rgba(10,132,255,0.5)":t.inpB}`,borderRadius:11,color:period===k?"#0a84ff":t.sub,padding:"7px 4px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {period==="custom"&&<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="date" value={customStart} onChange={e=>setCustomStart(e.target.value)} style={{...iS,flex:1}}/>
          <span style={{fontSize:11,color:t.muted}}>to</span>
          <input type="date" value={customEnd} onChange={e=>setCustomEnd(e.target.value)} style={{...iS,flex:1}}/>
        </div>}
      </Glass>

      {pb.length===0?<div style={{textAlign:"center",padding:"48px 0",color:t.muted}}><div style={{fontSize:40,marginBottom:10}}>📋</div><div>No bets in this period</div></div>:(
      <>
      {/* Hero summary */}
      <div style={{background:`linear-gradient(135deg,${plC}18,${plC}08)`,backdropFilter:"blur(28px)",WebkitBackdropFilter:"blur(28px)",border:`1px solid ${plC}35`,borderRadius:26,padding:"20px 22px",marginBottom:12,position:"relative",overflow:"hidden",boxShadow:`0 6px 32px ${plC}20`}}>
        <div style={{position:"absolute",top:-16,right:-16,fontSize:100,opacity:0.04,pointerEvents:"none"}}>📋</div>
        <div style={{fontSize:9,color:t.muted,letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:6}}>📋 {periodLabel} Report</div>
        <div style={{fontSize:42,fontWeight:900,color:plC,letterSpacing:-1.5,lineHeight:1}}>{tPL>=0?"+":""}{fc(tPL)}</div>
        <div style={{display:"flex",gap:14,marginTop:10,flexWrap:"wrap"}}>
          {[["ROI",`${roi.toFixed(1)}%`,plC],["Win Rate",`${wr.toFixed(0)}%`,"#0a84ff"],["Bets",pb.length,t.sub],["Staked",fc(tStake),t.muted]].map(([l,v,c])=>(
            <div key={l}><span style={{fontSize:10,color:t.muted}}>{l} </span><span style={{fontSize:12,fontWeight:700,color:c}}>{v}</span></div>
          ))}
        </div>
      </div>

      {/* Stat grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
        {[[`${won}W · ${lost}L · ${pending}⏳`,"Results","#ffd60a"],[`${wr.toFixed(0)}%`,"Win Rate",plC],[avgOdds.toFixed(2),"Avg Odds","#bf5af2"]].map(([v,l,c])=>(
          <div key={l} style={{background:t.card,backdropFilter:"blur(20px)",border:`1px solid ${t.cardB}`,borderRadius:18,padding:"14px",textAlign:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.1)"}}>
            <div style={{fontSize:9,color:t.muted,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>{l}</div>
            <div style={{fontSize:15,fontWeight:800,color:c,lineHeight:1.2}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Running P&L for period */}
      {runData2.length>=2&&<Glass t={t} style={{marginBottom:12}}>
        <SectionHead title="📈 P&L Trend" sub={periodLabel} t={t}/>
        <LineChart data={runData2} t={t} height={90}/>
      </Glass>}

      {/* Best / Worst */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {best&&best.result!=="pending"&&<div style={{background:"rgba(48,209,88,0.08)",border:"1px solid rgba(48,209,88,0.22)",borderRadius:18,padding:"14px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-8,right:-8,fontSize:40,opacity:0.06}}>🏆</div>
          <div style={{fontSize:9,color:"#30d158",fontWeight:800,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>🏆 Best</div>
          <div style={{fontSize:11,fontWeight:600,color:t.text,marginBottom:3,lineHeight:1.3}}>{best.match}</div>
          <div style={{fontSize:20,fontWeight:900,color:"#30d158"}}>+{fc(best.profit)}</div>
          <div style={{fontSize:9,color:t.muted,marginTop:2}}>{best.selection} @ {best.odds}</div>
        </div>}
        {worst&&worst.result!=="pending"&&<div style={{background:"rgba(255,69,58,0.08)",border:"1px solid rgba(255,69,58,0.22)",borderRadius:18,padding:"14px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-8,right:-8,fontSize:40,opacity:0.06}}>💀</div>
          <div style={{fontSize:9,color:"#ff453a",fontWeight:800,textTransform:"uppercase",letterSpacing:0.5,marginBottom:5}}>💀 Worst</div>
          <div style={{fontSize:11,fontWeight:600,color:t.text,marginBottom:3,lineHeight:1.3}}>{worst.match}</div>
          <div style={{fontSize:20,fontWeight:900,color:"#ff453a"}}>{fc(worst.profit)}</div>
          <div style={{fontSize:9,color:t.muted,marginTop:2}}>{worst.selection} @ {worst.odds}</div>
        </div>}
      </div>

      {/* By Sport */}
      {Object.keys(sportMap).length>0&&<Glass t={t} style={{marginBottom:12}}>
        <SectionHead title="🏆 By Sport" t={t}/>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {Object.entries(sportMap).sort((a,b)=>Math.abs(b[1].pl)-Math.abs(a[1].pl)).map(([sp,d])=>{
            const sWR=d.total>0?Math.round(d.won/d.total*100):0;
            return(
              <div key={sp} style={{display:"flex",alignItems:"center",gap:10,background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:12,padding:"10px 13px"}}>
                <span style={{fontSize:18}}>{SPORTS[sp]?.icon||"🎲"}</span>
                <div style={{flex:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:700,color:t.text}}>{SPORTS[sp]?.name||sp}</span>
                    <span style={{fontSize:13,fontWeight:800,color:d.pl>=0?"#30d158":"#ff453a"}}>{d.pl>=0?"+":""}{fc(d.pl)}</span>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <span style={{fontSize:9,color:t.muted}}>{d.bets} bets</span>
                    <span style={{fontSize:9,color:sWR>=50?"#30d158":"#ff453a",fontWeight:700}}>{sWR}% WR</span>
                    <span style={{fontSize:9,color:t.muted}}>ROI: {d.bets>0&&tStake>0?((d.pl/tStake)*100).toFixed(1):0}%</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </Glass>}

      {/* By Bookie */}
      {Object.keys(bkMap).length>0&&<Glass t={t} style={{marginBottom:12}}>
        <SectionHead title="🎰 By Bookie" t={t}/>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {Object.entries(bkMap).sort((a,b)=>b[1].pl-a[1].pl).map(([bk,d])=>{
            const bkWR=d.total>0?Math.round(d.won/d.total*100):0;
            return(
              <div key={bk} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:11,padding:"9px 13px"}}>
                <div>
                  <div style={{fontSize:12,fontWeight:700,color:t.text}}>🎰 {bk}</div>
                  <div style={{fontSize:9,color:t.muted}}>{d.bets} bets · {bkWR}% WR</div>
                </div>
                <div style={{fontSize:14,fontWeight:800,color:d.pl>=0?"#30d158":"#ff453a"}}>{d.pl>=0?"+":""}{fc(d.pl)}</div>
              </div>
            );
          })}
        </div>
      </Glass>}

      {/* Tags */}
      {Object.keys(tagMap).length>0&&<Glass t={t} style={{marginBottom:12}}>
        <SectionHead title="🏷️ By Tag" t={t}/>
        <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
          {Object.entries(tagMap).map(([tag,d])=>(
            <div key={tag} style={{flex:1,minWidth:90,background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:12,padding:"9px 11px"}}>
              <div style={{fontSize:9,color:"#0a84ff",fontWeight:700,marginBottom:3}}>🏷️ {tag}</div>
              <div style={{fontSize:14,fontWeight:800,color:d.pl>=0?"#30d158":"#ff453a"}}>{d.pl>=0?"+":""}{fc(d.pl)}</div>
              <div style={{fontSize:9,color:t.muted}}>{d.bets} bets</div>
            </div>
          ))}
        </div>
      </Glass>}

      {/* Export button */}
      <button onClick={exportReport} className="btn-press" style={{width:"100%",background:"linear-gradient(135deg,#0a84ff,#0055cc)",border:"none",borderRadius:16,color:"#fff",padding:"14px",fontSize:14,fontWeight:800,cursor:"pointer",boxShadow:"0 4px 20px rgba(10,132,255,0.4)",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span>📤</span> Export {periodLabel} Report
      </button>
      </>)}
    </div>
  );
}

function WinCardModal({show,onClose,bet,t}){
  if(!show||!bet)return null;
  const sport=SPORTS[bet.sport]||SPORTS.cricket;
  const isWin=(bet.profit||0)>0;
  const profitAmt=Math.round(bet.profit||0);
  const shareText=`${isWin?"Win":"Result"}: ${bet.match}\n${bet.selection} @ ${bet.odds}\n${isWin?"+":""}${profitAmt.toLocaleString("en-IN")} Rs\n\nTracked with BetTracker Pro`;
  const copyText=()=>{
    try{navigator.clipboard.writeText(shareText);}
    catch{const ta=document.createElement("textarea");ta.value=shareText;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
    alert("Text copied!");

        </div>
        <div style={{background:"linear-gradient(135deg,#0a0a1a,#0d1a2e)",borderRadius:22,padding:"24px 22px",marginBottom:16,position:"relative",overflow:"hidden",border:`1px solid rgba(255,255,255,0.1)`}}>
          <div style={{position:"absolute",top:-24,right:-24,fontSize:100,opacity:0.06}}>{sport.icon}</div>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${c},transparent)`}}/>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
            <div style={{fontSize:28}}>{sport.icon}</div>
            <div>
              <div style={{fontSize:8,color:"rgba(255,255,255,0.45)",textTransform:"uppercase",letterSpacing:1.2,fontWeight:700}}>BetTracker Pro</div>
              <div style={{fontSize:13,fontWeight:800,color:"#fff",lineHeight:1.3}}>{bet.match}</div>
            </div>
          </div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginBottom:8}}>{bet.selection} @ <b style={{color:"#ffd60a"}}>{bet.odds}</b>{bet.market?" · "+bet.market:""}</div>
          <div style={{fontSize:40,fontWeight:900,color:c,letterSpacing:-1,lineHeight:1,marginBottom:6}}>{isWin?"+":""}{profitAmt.toLocaleString("en-IN")} Rs</div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{bet.date}{bet.bookie?" · "+bet.bookie:""}</div>
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:6}}>
            <div style={{height:1,flex:1,background:"rgba(255,255,255,0.08)"}}/>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.25)",fontWeight:700,letterSpacing:0.8}}>SMART FAST DISCIPLINED</div>
            <div style={{height:1,flex:1,background:"rgba(255,255,255,0.08)"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={copyText} className="btn-press" style={{flex:1,background:"rgba(10,132,255,0.2)",border:"1px solid rgba(10,132,255,0.4)",borderRadius:13,color:"#0a84ff",padding:"11px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Copy Text</button>
          <button onClick={shareWA} className="btn-press" style={{flex:1,background:"rgba(37,211,102,0.2)",border:"1px solid rgba(37,211,102,0.4)",borderRadius:13,color:"#25d166",padding:"11px",fontSize:12,fontWeight:700,cursor:"pointer"}}>WhatsApp</button>
        </div>
      </div>
    </div>
  );
}

function StakeRecommenderModal({show,onClose,bets,t,showToast}){
  const [bankroll,setBankroll]=useState(()=>MEM.get("bankroll",10000));
  const [confidence,setConfidence]=useState(3);
  const [odds,setOdds]=useState("");
  const [estProb,setEstProb]=useState("");
  if(!show)return null;
  const iS={width:"100%",background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:10,color:t.text,fontSize:13,padding:"9px 12px",outline:"none",boxSizing:"border-box"};
  const stats=computeStats(bets);
  const wr=stats.wr/100;
  const kelly=stats.kelly;
  const avgOdds=stats.avgOdds||2;
  const o=parseFloat(odds)||avgOdds;
  const p=parseFloat(estProb)/100||wr;
  const b_=o-1;
  const kellyFrac=b_>0?((p*b_-(1-p))/b_):0;
  const halfKelly=Math.max(0,kellyFrac/2);
  const qtrKelly=Math.max(0,kellyFrac/4);
  const confMult=[0.25,0.5,0.75,1.0,1.25][confidence-1]||1;
  const recommended=Math.round(bankroll*halfKelly*confMult);
  const safe=Math.round(bankroll*qtrKelly);
  const aggressive=Math.round(bankroll*Math.max(0,kellyFrac));
  const ev=p&&o?Math.round(recommended*((p*(o-1))-((1-p)*1))):null;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",backdropFilter:"blur(20px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:14}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="pop" style={{background:t.modal,border:`1px solid ${t.cardB}`,borderRadius:26,padding:22,width:"100%",maxWidth:400,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 40px 100px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div><div style={{fontSize:17,fontWeight:800,color:t.text}}>Stake Recommender</div><div style={{fontSize:10,color:t.muted}}>Kelly Criterion based suggestion</div></div>
          <button onClick={onClose} style={{background:t.inp,border:`1px solid ${t.inpB}`,borderRadius:50,color:t.sub,width:30,height:30,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>x</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div style={{gridColumn:"1/-1"}}><div style={{fontSize:9,color:t.muted,marginBottom:3,textTransform:"uppercase",fontWeight:700}}>Bankroll (Rs)</div><input type="number" value={bankroll} onChange={e=>setBankroll(parseFloat(e.target.value)||0)} style={iS}/></div>
          <div><div style={{fontSize:9,color:t.muted,marginBottom:3,textTransform:"uppercase",fontWeight:700}}>Odds</div><input type="number" step="0.01" value={odds} onChange={e=>setOdds(e.target.value)} style={iS} placeholder={avgOdds.toFixed(2)}/></div>
          <div><div style={{fontSize:9,color:t.muted,marginBottom:3,textTransform:"uppercase",fontWeight:700}}>Your Win % Estimate</div><input type="number" min="1" max="99" value={estProb} onChange={e=>setEstProb(e.target.value)} style={iS} placeholder={(wr*100).toFixed(0)}/></div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:9,color:t.muted,marginBottom:5,textTransform:"uppercase",fontWeight:700}}>Confidence</div>
          <div style={{display:"flex",gap:5}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setConfidence(n)} style={{flex:1,background:confidence===n?"rgba(10,132,255,0.25)":t.inp,border:`1px solid ${confidence===n?"rgba(10,132,255,0.5)":t.inpB}`,borderRadius:10,color:confidence===n?"#0a84ff":t.sub,padding:"8px 2px",cursor:"pointer",fontSize:11,fontWeight:700}}>{"*".repeat(n)}</button>)}</div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {[["Safe",safe,"#30d158","1/4 Kelly"],["Recommended",recommended,"#0a84ff","1/2 Kelly"],["Aggressive",aggressive,"#ff9f0a","Full Kelly"]].map(([label,amount,color,desc])=>(
            <div key={label} style={{background:t.inp,border:`1px solid ${color}40`,borderRadius:13,padding:"11px",textAlign:"center"}}>
              <div style={{fontSize:8,color:t.muted,marginBottom:3,fontWeight:700}}>{label}</div>
              <div style={{fontSize:amount>0?15:10,fontWeight:800,color,lineHeight:1.2}}>{amount>0?`Rs ${amount.toLocaleString("en-IN")}`:"No bet"}</div>
              <div style={{fontSize:8,color:t.muted,marginTop:2}}>{desc}</div>
            </div>
          ))}
        </div>
        {ev!==null&&<div style={{background:ev>=0?"rgba(48,209,88,0.1)":"rgba(255,69,58,0.1)",border:`1px solid ${ev>=0?"rgba(48,209,88,0.3)":"rgba(255,69,58,0.3)"}`,borderRadius:13,padding:"11px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:9,color:t.muted}}>Expected Value</div><div style={{fontSize:20,fontWeight:800,color:ev>=0?"#30d158":"#ff453a"}}>{ev>=0?"+":""}{ev.toLocaleString("en-IN")} Rs</div></div>
          <div style={{fontSize:16,fontWeight:800,color:ev>=0?"#30d158":"#ff453a"}}>{ev>=0?"YES":"NO"}</div>
        </div>}
        <div style={{background:t.inp,borderRadius:11,padding:"9px 12px",fontSize:10,color:t.muted,lineHeight:1.6}}>Based on your win rate: <b style={{color:"#0a84ff"}}>{(wr*100).toFixed(1)}%</b> | Kelly: <b style={{color:"#ffd60a"}}>{Math.max(0,kelly).toFixed(1)}%</b></div>
      </div>
    </div>
  );
}

function checkDuplicate(bets,match,market){
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  return bets.find(b=>b.result==="pending"&&new Date(b.date)>=yesterday&&(b.match||"").toLowerCase()===(match||"").toLowerCase()&&(b.market||"").toLowerCase()===(market||"").toLowerCase());
}

function exportCSV(bets){
  const hdr=["Date","Sport","Match","Market","Selection","BetType","Odds","Stake","Result","PL","Bookie","Confidence","LiveBet","EstWinProb","Tags","Notes"];
  const rows=bets.map(b=>[b.date,b.sport||"cricket",b.match,b.market,b.selection,b.betType||"Single",b.odds,b.stake,b.result,b.profit||0,b.bookie||"",b.confidence||0,b.livebet?"Yes":"No",b.estWinProb||0,(b.tags||[]).join(";"),b.notes||""]);
  const csv=[hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=`bets-${today()}.csv`;a.click();
}

function importCSV(file,onImport,showToast){
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const lines=e.target.result.split("\n").filter(l=>l.trim());
      const rows=lines.slice(1).map(line=>{
        const cols=[];let cur="",inQ=false;
        for(let i=0;i<line.length;i++){const c=line[i];if(c==='"')inQ=!inQ;else if(c===","&&!inQ){cols.push(cur);cur="";}else cur+=c;}
        cols.push(cur);
        return cols.map(c=>c.replace(/^"|"$/g,"").replace(/""/g,'"'));
      }).filter(r=>r.length>=8);
      const imported=rows.map((r,i)=>({id:Date.now()+i,date:r[0]||today(),sport:r[1]||"cricket",match:r[2]||"",market:r[3]||"",selection:r[4]||"",betType:r[5]||"Single",odds:parseFloat(r[6])||0,stake:parseFloat(r[7])||0,result:r[8]||"pending",profit:parseFloat(r[9])||0,bookie:r[10]||"",confidence:parseInt(r[11])||0,livebet:r[12]==="Yes",estWinProb:parseFloat(r[13])||0,tags:r[14]?r[14].split(";").filter(Boolean):[],notes:r[15]||""})).filter(b=>b.match&&b.odds&&b.stake);
      onImport(imported);showToast(`✅ Imported ${imported.length} bets!`,"success");
    }catch(err){showToast("❌ Import failed. Check CSV format.","error");}
  };
  reader.readAsText(file);
}

function saveFile(bets,bookies,sessions,theme,showToast){
  const data={bets,bookies,sessions,theme,templates:MEM.get("templates",[]),bankroll:MEM.get("bankroll",10000),target:MEM.get("target",5000),dailyLim:MEM.get("dailyLim",2000),goalProfit:MEM.get("goalProfit",10000),goalWR:MEM.get("goalWR",55),goalBets:MEM.get("goalBets",50),goalROI:MEM.get("goalROI",10),currency:MEM.get("currency","INR"),cooldownEnabled:MEM.get("cooldownEnabled",true),cooldownAfter:MEM.get("cooldownAfter",3)};
  const html=document.documentElement.outerHTML;
  const cleaned=html.replace(/<script id="__data__"[\s\S]*?<\/script>/,"");
  const tag=`<script id="__data__" type="application/json">${JSON.stringify(data)}<\/script>`;
  const final=cleaned.replace("</body>",tag+"\n</body>");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([final],{type:"text/html"}));a.download=`BetTracker-${today()}.html`;a.click();
  showToast("💾 Saved! Use this new file next time.","success");
}

        <div style={{position:"absolute",top:-80,left:-80,width:340,height:340,background:`radial-gradient(circle,${t.o1} 0%,transparent 70%)`,borderRadius:"50%"}}/>
        <div style={{position:"absolute",top:320,right:-80,width:280,height:280,background:`radial-gradient(circle,${t.o2} 0%,transparent 70%)`,borderRadius:"50%"}}/>
        <div style={{position:"absolute",bottom:180,left:"18%",width:240,height:240,background:`radial-gradient(circle,${t.o3} 0%,transparent 70%)`,borderRadius:"50%"}}/>
      </div>

      {/* Side Drawer */}
      {showDrawer&&(
        <div style={{position:"fixed",inset:0,zIndex:500}} onClick={()=>setShowDrawer(false)}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",backdropFilter:"blur(4px)"}}/>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",right:0,top:0,bottom:0,width:"78%",maxWidth:320,background:t.modal,borderLeft:`1px solid ${t.cardB}`,display:"flex",flexDirection:"column",animation:"slideIn 0.26s cubic-bezier(.22,1,.36,1)",padding:"0 0 32px"}}>
            <div style={{padding:"52px 20px 16px",borderBottom:`1px solid ${t.cardB}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:8,color:t.muted,letterSpacing:1.6,textTransform:"uppercase",fontWeight:700,marginBottom:2}}>Sports Tracker Pro</div>
                  <div style={{fontSize:22,fontWeight:900,letterSpacing:-0.5,color:t.text}}>🏆 BetTracker</div>
                </div>
                <button onClick={()=>setShowDrawer(false)} style={{background:t.card,border:`1px solid ${t.cardB}`,borderRadius:10,color:t.sub,padding:"6px 10px",cursor:"pointer",fontSize:16}}>✕</button>
              </div>
              <div style={{display:"flex",gap:6,marginTop:14}}>
                {Object.entries(THEMES).map(([k,v])=>(
                  <button key={k} onClick={()=>{setTheme(k);MEM.set("theme",k);}} style={{flex:1,background:theme===k?"rgba(10,132,255,0.2)":"transparent",border:`1px solid ${theme===k?"rgba(10,132,255,0.4)":t.cardB}`,borderRadius:10,color:theme===k?"#0a84ff":t.sub,padding:"8px 4px",cursor:"pointer",fontSize:16,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span>{v.i}</span><span style={{fontSize:8,fontWeight:700}}>{v.n}</span>
                  </button>
                ))}
              </div>
              <div style={{marginTop:12}}>
                <div style={{fontSize:9,color:t.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Accent Color</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  {ACCENT_PRESETS.map(({name,color})=>(
                    <div key={color} onClick={()=>setAccentColor(color)} title={name} style={{width:26,height:26,borderRadius:"50%",background:color,cursor:"pointer",border:`3px solid ${accentColor===color?"#fff":"transparent"}`,boxShadow:accentColor===color?`0 0 10px ${color}`:"none",transition:"all 0.15s"}}/>
                  ))}
                </div>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 12px"}}>
              {[
                {icon:"🏅",label:"Achievements",badge:achUnlocked,color:"#ffd60a",fn:()=>{setShowAch(true);setShowDrawer(false);}},
                {icon:"🎯",label:"Goals",color:"#30d158",fn:()=>{setShowGoals(true);setShowDrawer(false);}},
                {icon:"🤖",label:"AI Advisor",color:"#0a84ff",fn:()=>{setShowAI(true);setShowDrawer(false);}},
                {icon:"📸",label:"Scan Bet Slip",color:"#bf5af2",fn:()=>{setShowScanner(true);setShowDrawer(false);}},
                {icon:"🏏",label:"IPL 2026 Schedule",color:"#ff9f0a",fn:()=>{setShowIPL(true);setShowDrawer(false);}},
                {icon:"⚖️",label:"Odds Compare",color:"#30d158",fn:()=>{setShowOddsCompare(true);setShowDrawer(false);}},
                {icon:"📊",label:"Tipster Tracker",color:"#0a84ff",fn:()=>{setShowTipster(true);setShowDrawer(false);}},
                {icon:"🔄",label:"Templates",color:t.sub,fn:()=>{setShowTemplates(true);setShowDrawer(false);}},
                {icon:"📝",label:"Session Notes",color:t.sub,fn:()=>{setShowSession(true);setShowDrawer(false);}},
                {icon:"🎰",label:"Manage Bookies",color:t.sub,fn:()=>{setShowBookies(true);setShowDrawer(false);}},
                {icon:"⚙️",label:"Settings",color:t.sub,fn:()=>{setShowSettings(true);setShowDrawer(false);}},
                {icon:"💰",label:"Multiple Bankrolls",color:"#30d158",fn:()=>{setShowMultiBank(true);setShowDrawer(false);}},
                {icon:"🎯",label:"Stake Recommender",color:"#bf5af2",fn:()=>{setShowStakeRec(true);setShowDrawer(false);}},
                {icon:"🤝",label:"Head-to-Head",color:"#ff9f0a",fn:()=>{setShowH2H(true);setShowDrawer(false);}},
                {icon:"🔔",label:"Match Alerts",color:"#5ac8fa",fn:()=>{setShowAlerts(true);setShowDrawer(false);}},
                {icon:"📦",label:"Parlay Builder",color:"#bf5af2",fn:()=>{setShowParlay(true);setShowDrawer(false);}},
                {icon:"🏆",label:"Tipster Profiles",color:"#ffd60a",fn:()=>{setShowTipsterProf(true);setShowDrawer(false);}},
              ].map((item,i)=>(
                <button key={i} onClick={item.fn} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"13px 10px",background:"transparent",border:"none",borderRadius:12,color:t.text,cursor:"pointer",textAlign:"left",position:"relative"}} className="btn-press">
                  <span style={{fontSize:22,width:32,textAlign:"center"}}>{item.icon}</span>
                  <span style={{fontSize:14,fontWeight:600,color:item.color||t.text,flex:1}}>{item.label}</span>
                  {item.badge>0&&<span style={{background:"#ff453a",borderRadius:50,minWidth:18,height:18,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,padding:"0 4px"}}>{item.badge}</span>}
                  <span style={{color:t.muted,fontSize:12}}>›</span>
                </button>
              ))}
              <div style={{height:1,background:t.cardB,margin:"8px 0"}}/>
              <button onClick={()=>{exportCSV(bets);setShowDrawer(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"13px 10px",background:"transparent",border:"none",borderRadius:12,color:t.text,cursor:"pointer",textAlign:"left"}} className="btn-press">
                <span style={{fontSize:22,width:32,textAlign:"center"}}>📥</span>
                <span style={{fontSize:14,fontWeight:600,color:t.sub,flex:1}}>Export CSV</span>
              </button>
              <input ref={fileRef} type="file" accept=".csv" onChange={e=>{if(e.target.files[0])importCSV(e.target.files[0],handleImport,showToast);e.target.value="";}}/>
              <button onClick={()=>{fileRef.current.click();setShowDrawer(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"13px 10px",background:"transparent",border:"none",borderRadius:12,color:t.text,cursor:"pointer",textAlign:"left"}} className="btn-press">
                <span style={{fontSize:22,width:32,textAlign:"center"}}>📤</span>
                <span style={{fontSize:14,fontWeight:600,color:t.sub,flex:1}}>Import CSV</span>
              </button>
              {showPwaBtn&&<button onClick={()=>{installPwa();setShowDrawer(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"13px 10px",background:"transparent",border:"none",borderRadius:12,color:t.text,cursor:"pointer",textAlign:"left"}} className="btn-press">
                <span style={{fontSize:22,width:32,textAlign:"center"}}>📲</span>
                <span style={{fontSize:14,fontWeight:600,color:"#bf5af2",flex:1}}>Install App</span>
              </button>}
            </div>
            <div style={{padding:"0 16px"}}>
              <button onClick={()=>{saveFile(bets,bookies,sessions,theme,showToast);setShowDrawer(false);}} style={{width:"100%",background:"linear-gradient(135deg,#30d158,#248a3d)",border:"none",borderRadius:14,color:"#fff",padding:"14px",cursor:"pointer",fontSize:15,fontWeight:800,boxShadow:"0 4px 18px rgba(48,209,88,0.35)"}}>
                💾 Save File
              </button>
            </div>
          </div>
        </div>
      )}

      {showFabMenu&&<div style={{position:"fixed",inset:0,zIndex:200}} onClick={()=>setShowFabMenu(false)}/>}

      <div style={{position:"relative",zIndex:1,maxWidth:720,margin:"0 auto",padding:"60px 14px 120px"}}>
        {/* Tab Content */}
        {tab===0&&<Dashboard bets={bets} t={t}/>}
        {tab===1&&<BetsTab bets={bets} onEdit={handleEdit} onDelete={handleDelete} onDuplicate={handleDuplicate} onMarkResult={handleMarkResult} onBulkResult={handleBulkResult} onShare={(b)=>{setWinCardBet(b);setShowWinCard(true);}} t={t}/>}
        {tab===2&&<AnalyticsTab bets={bets} t={t}/>}
        {tab===3&&<CalendarTab bets={bets} t={t}/>}
        {tab===4&&<BankrollTab bets={bets} t={t} showToast={showToast}/>}
        {tab===5&&<CalculatorTab t={t}/>}
        {tab===6&&<ReportTab bets={bets} t={t} showToast={showToast}/>}
      </div>

      {/* FAB Speed Dial */}
      {showFabMenu&&(
        <div style={{position:"fixed",bottom:88,right:20,zIndex:300,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10,animation:"fadeUp 0.18s ease"}}>
          {[
            {icon:"⚡",label:"Quick Add",color:"#0a84ff",fn:()=>{setShowQuick(true);setShowFabMenu(false);}},
            {icon:"➕",label:"Add Bet",color:"#30d158",fn:()=>{setEditBet(null);setShowModal(true);setShowFabMenu(false);}},
          ].map((item,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{background:t.nav,backdropFilter:"blur(20px)",border:`1px solid ${t.cardB}`,borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,color:t.text,whiteSpace:"nowrap",boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>{item.label}</div>
              <button onClick={item.fn} style={{width:46,height:46,borderRadius:14,background:item.color,border:"none",color:"#fff",fontSize:20,cursor:"pointer",boxShadow:`0 4px 18px ${item.color}55`,display:"flex",alignItems:"center",justifyContent:"center"}} className="btn-press">{item.icon}</button>
            </div>
          ))}
        </div>
      )}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,display:"flex",justifyContent:"center",padding:"0 10px max(10px,env(safe-area-inset-bottom))",alignItems:"flex-end",gap:10}}>
        {/* Main nav pill */}
        <div style={{background:t.nav,backdropFilter:"blur(40px)",WebkitBackdropFilter:"blur(40px)",border:`1px solid ${t.cardB}`,borderRadius:24,padding:"5px",display:"flex",gap:1,boxShadow:"0 -4px 30px rgba(0,0,0,0.2)",flex:1,maxWidth:440}}>
          {TABS.map(([icon,name],i)=>(
            <button key={i} onClick={()=>setTab(i)} className="btn-press" style={{flex:1,background:tab===i?"rgba(10,132,255,0.22)":"transparent",border:tab===i?"1px solid rgba(10,132,255,0.32)":"1px solid transparent",borderRadius:18,color:tab===i?"#0a84ff":t.muted,padding:"7px 2px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,transition:"all 0.15s"}}>
              <span style={{fontSize:14}}>{icon}</span>
              <span style={{fontSize:9,fontWeight:tab===i?700:500,letterSpacing:0.1}}>{name}</span>
            </button>
          ))}
        </div>
        {/* FAB + Hamburger column */}
        <div style={{display:"flex",flexDirection:"column",gap:6,paddingBottom:3}}>
          {/* FAB */}
          <button onClick={()=>{if(navigator.vibrate)navigator.vibrate(10);setShowFabMenu(p=>!p);}} className="btn-press" style={{width:52,height:52,borderRadius:16,background:showFabMenu?"rgba(255,69,58,0.9)":"linear-gradient(135deg,#0a84ff,#0055cc)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 4px 20px rgba(10,132,255,0.5)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
            {showFabMenu?"✕":"＋"}
          </button>
          {/* Hamburger */}
          <button onClick={()=>setShowDrawer(true)} className="btn-press" style={{width:52,height:34,borderRadius:12,background:t.nav,backdropFilter:"blur(20px)",border:`1px solid ${t.cardB}`,color:t.sub,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.2)"}}>
            ☰
          </button>
        </div>
      </div>

      <BetModal show={showModal} onClose={()=>{setShowModal(false);setEditBet(null);}} onSave={handleSave} editBet={editBet} t={t} bookies={bookies}/>
      <QuickAddModal show={showQuick} onClose={()=>setShowQuick(false)} onSave={handleQuickSave} t={t} bookies={bookies}/>
      <BookiesModal show={showBookies} onClose={()=>setShowBookies(false)} bookies={bookies} setBookies={setBookies} t={t}/>
      <SessionModal show={showSession} onClose={()=>setShowSession(false)} sessions={sessions} setSessions={setSessions} t={t}/>
      <AchievementsModal show={showAch} onClose={()=>setShowAch(false)} bets={bets} t={t}/>
      <SlipScannerModal show={showScanner} onClose={()=>setShowScanner(false)} onSave={(b)=>setBets(prev=>[b,...prev])} t={t} bookies={bookies} showToast={showToast}/>
      <GoalsModal show={showGoals} onClose={()=>setShowGoals(false)} bets={bets} t={t} showToast={showToast}/>
      <TemplatesModal show={showTemplates} onClose={()=>setShowTemplates(false)} templates={templates} setTemplates={setTemplates} onAddBet={(b)=>setBets(prev=>[b,...prev])} t={t} bookies={bookies} showToast={showToast}/>
      <TipsterModal show={showTipster} onClose={()=>setShowTipster(false)} bets={bets} t={t} showToast={showToast}/>
      <OddsCompareModal show={showOddsCompare} onClose={()=>setShowOddsCompare(false)} t={t} bookies={bookies}/>
      <AIAdvisorModal show={showAI} onClose={()=>setShowAI(false)} bets={bets} t={t} showToast={showToast}/>
      <SettingsModal show={showSettings} onClose={()=>setShowSettings(false)} t={t} showToast={showToast}/>
      <IPLScheduleModal show={showIPL} onClose={()=>setShowIPL(false)} onMatchSelect={(match)=>{setShowModal(true);}} t={t}/>
      <CooldownModal show={showCooldown} onClose={()=>setShowCooldown(false)} onConfirm={cooldownResolve||(() => setShowCooldown(false))} t={t} lossCount={MEM.get("cooldownAfter",3)}/>
      <WinCardModal show={showWinCard} onClose={()=>setShowWinCard(false)} bet={winCardBet} t={t}/>
      <MultiBankrollModal show={showMultiBank} onClose={()=>setShowMultiBank(false)} t={t} showToast={showToast} bets={bets}/>
      <StakeRecommenderModal show={showStakeRec} onClose={()=>setShowStakeRec(false)} bets={bets} t={t} showToast={showToast}/>
      <HeadToHeadModal show={showH2H} onClose={()=>setShowH2H(false)} t={t} bets={bets}/>
      <UpcomingAlertsModal show={showAlerts} onClose={()=>setShowAlerts(false)} t={t} showToast={showToast} onMatchSelect={(match)=>{setShowModal(true);setShowAlerts(false);}}/>
      <ParlayBuilderModal show={showParlay} onClose={()=>setShowParlay(false)} t={t} bets={bets} showToast={showToast} onAddBet={(b)=>setBets(prev=>[b,...prev])} bookies={bookies}/>
      <TipsterProfilesModal show={showTipsterProf} onClose={()=>setShowTipsterProf(false)} t={t} bets={bets} showToast={showToast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
